<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Viewer</title>
  <link rel="stylesheet" href="../../assets/css/app.css">
  <link rel="stylesheet" href="../../assets/css/viewer_enhancements.css">
  <script defer src="../auth/auth.js"></script>
  <script defer src="./viewer.js"></script>
</head>
<body class="viewer-page">
  <header class="topbar viewer-topbar">
    <div>
      <a class="brand" href="../../index.html">my_git_documents</a>
    </div>
  </header>
  <main class="shell viewer-shell-root">
    <section class="section" data-access-gate hidden>
      <h2 data-gate-title>Continue</h2>
      <p data-gate-prompt></p>
      <input type="text" placeholder="Shared phrase">
      <div class="button-row">
        <button type="button">Continue</button>
      </div>
      <p class="subtle" data-gate-error></p>
    </section>
    <div data-protected-body>
      <div class="workspace-shell">
        <aside class="workspace-sidebar">
          <div id="workspace-header" class="workspace-header viewer-sidebar-header">
            <div>
              <h1 id="workspace-title" class="workspace-title">Viewer</h1>
              <p id="workspace-subtitle" class="workspace-subtitle">Document workspace</p>
            </div>
            <button class="icon-button" id="toggle-sidebar" type="button" title="Hide or show navigation">◧</button>
          </div>
          <div id="workspace-tree"></div>
        </aside>
        <section class="workspace-main">
          <div class="toolbar icon-toolbar viewer-toolbar">
            <div class="viewer-toolbar-row">
              <div class="button-row compact-buttons">
                <button class="icon-button" data-layout-button="auto" type="button" title="Auto layout">A</button>
                <button class="icon-button" data-layout-button="1" type="button" title="1 column">1</button>
                <button class="icon-button" data-layout-button="2" type="button" title="2 columns">2</button>
                <button class="icon-button" data-layout-button="3" type="button" title="3 columns">3</button>
                <button class="icon-button" data-layout-button="4" type="button" title="4 columns">4</button>
                <button class="icon-button" data-layout-button="5" type="button" title="5 columns">5</button>
                <button class="icon-button" data-layout-button="rows" type="button" title="Rows">☰</button>
                <button class="icon-button" id="size-small" type="button" title="Small panels">S</button>
                <button class="icon-button" id="size-medium" type="button" title="Medium panels">M</button>
                <button class="icon-button" id="size-large" type="button" title="Large panels">L</button>
                <button class="icon-button" id="save-group" type="button" title="Save current selection as a group">＋G</button>
                <input id="viewer-find" type="text" placeholder="Find in active document">
                <button class="icon-button" id="viewer-find-button" type="button" title="Find">⌕</button>
                <button class="icon-button" id="print-view" type="button" title="Print">⎙</button>
              </div>
              <div id="viewer-tabs" class="viewer-tabs-host"></div>
            </div>
            <div id="viewer-groups" class="viewer-groups"></div>
          </div>
          <p id="toolbar-status" class="toolbar-status"></p>
          <div id="viewer-grid" class="layout-grid" data-layout="auto" data-size="medium"></div>
          <section id="notes-panel" class="notes-panel">
            <h2 class="notes-label">Notes</h2>
            <p class="notes-helper">Saved locally in browser storage for this baseline.</p>
            <textarea id="notes-text" placeholder="Capture notes during the interview here."></textarea>
            <div class="button-row">
              <button id="insert-timestamp" type="button">Insert Timestamp</button>
              <button id="copy-notes" type="button">Copy</button>
            </div>
            <p id="save-status" class="subtle">Notes are stored locally in the browser.</p>
          </section>
        </section>
      </div>
    </div>
  </main>
</body>
</html>
