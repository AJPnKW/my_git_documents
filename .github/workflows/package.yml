name: Package

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build site index
        run: python scripts/build_site_index.py
      - name: Create package
        run: python scripts/package_release.py
      - uses: actions/upload-artifact@v4
        with:
          name: my_git_documents-package
          path: reports/packages/*.zip
