<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resumes</title>
  <link rel="stylesheet" href="../../assets/css/app.css">
  <script defer src="../../shared/auth/auth.js"></script>
  <script defer src="../../shared/viewer/viewer.js"></script>
</head>
<body>
  <header class="topbar">
    <div>
      <a class="brand" href="./index.html">Resumes</a>
    </div>
  </header>
  <main class="shell">
    <section class="section" data-access-gate hidden>
      <h2 data-gate-title>Continue</h2>
      <p data-gate-prompt></p>
      <input type="text" placeholder="Workspace phrase">
      <div class="button-row">
        <button type="button">Continue</button>
      </div>
      <p class="subtle" data-gate-error></p>
    </section>
    <div data-protected-body>
      <div class="workspace-shell">
        <aside class="workspace-sidebar">
          <h1 id="workspace-title" class="workspace-title">Resumes</h1>
          <p id="workspace-subtitle" class="workspace-subtitle">Interview workspace</p>
          <div id="workspace-tree"></div>
        </aside>
        <section class="workspace-main">
          <div class="toolbar icon-toolbar">
            <div class="button-row">
              <button class="icon-button" data-mode-button="single" type="button" title="Single document">◧</button>
              <button class="icon-button" data-mode-button="compare" type="button" title="Side by side">◫</button>
              <button class="icon-button" data-mode-button="columns" type="button" title="Three columns">▥</button>
              <button class="icon-button" data-mode-button="stack" type="button" title="Cascade stack">▤</button>
              <button class="icon-button" id="zoom-in" type="button" title="Zoom in">＋</button>
              <button class="icon-button" id="zoom-out" type="button" title="Zoom out">－</button>
              <button class="icon-button" id="zoom-reset" type="button" title="Reset zoom">↺</button>
              <button class="icon-button" id="fit-width" type="button" title="Fit width">↔</button>
              <button class="icon-button" id="fit-page" type="button" title="Fit page">⬚</button>
              <input id="viewer-find" type="text" placeholder="Find in current document">
              <button class="icon-button" id="viewer-find-button" type="button" title="Find">⌕</button>
              <button class="icon-button" id="print-view" type="button" title="Print">⎙</button>
            </div>
          </div>
          <p id="toolbar-status" class="toolbar-status"></p>
          <div id="viewer-grid" class="layout-grid" data-mode="compare"></div>
          <section id="notes-panel" class="notes-panel">
            <h2 class="notes-label">Interview Notes</h2>
            <p class="notes-helper">Use this bottom input area for interview questions, follow-ups, answers, and general notes you want to reread.</p>
            <textarea id="notes-text" placeholder="Write the question they asked, your follow-up points, or general interview notes here."></textarea>
            <div class="button-row">
              <button id="insert-timestamp" type="button">Insert Timestamp</button>
              <button id="copy-notes" type="button">Copy</button>
            </div>
            <p id="save-status" class="subtle">Notes are stored locally in the browser.</p>
          </section>
        </section>
      </div>
    </div>
    <script id="workspace-config" type="application/json">
      {
        "siteTitle": "Resumes",
        "siteSummary": "Interview workspace",
        "noteStorageKey": "mgd:notes:resumes:venuiti:technology_project_manager",
        "showNotes": true,
        "showToolbarStatus": false,
        "showPanelHeader": false,
        "defaultMode": "compare",
        "notePlaceholder": "Write the interview question, your answer notes, follow-up tasks, or any general notes here.",
        "groups": [
          {
            "label": "Company",
            "heading": "Venuiti",
            "items": []
          },
          {
            "label": "Posting",
            "heading": "Technology Project Manager",
            "items": [
              {
                "id": "venuiti-posting",
                "label": "Job Posting",
                "description": "",
                "href": "./companies/venuiti/postings/technology_project_manager/job_posting.html",
                "selected": true
              },
              {
                "id": "venuiti-resume",
                "label": "Resume",
                "description": "",
                "href": "./companies/venuiti/postings/technology_project_manager/resume.html",
                "selected": true
              },
              {
                "id": "venuiti-questions",
                "label": "Interview Planning Notes",
                "description": "",
                "href": "./companies/venuiti/postings/technology_project_manager/interview_questions.html",
                "selected": false
              },
              {
                "id": "venuiti-notes",
                "label": "Notes Artifact",
                "description": "",
                "href": "./companies/venuiti/postings/technology_project_manager/notes.html",
                "selected": false
              }
            ]
          }
        ]
      }
    </script>
  </main>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      window.MyGitDocumentsAuth.bootGate("resumes");
    });
  </script>
</body>
</html>
