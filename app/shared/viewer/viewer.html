<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Viewer</title>
  <link rel="stylesheet" href="../../assets/css/app.css">
  <script defer src="./viewer.js"></script>
</head>
<body>
  <header class="topbar">
    <div>
      <a class="brand" href="../../index.html">my_git_documents</a>
      <div class="subtle">Single, dual, and tri-view reading workspace</div>
    </div>
    <nav class="topnav">
      <a href="../../index.html">Home</a>
      <a href="../../sites/resumes/index.html">Resumes</a>
      <a href="../../sites/yellow_house/index.html">Yellow House</a>
    </nav>
  </header>
  <main class="shell">
    <section class="viewer-shell">
      <div class="breadcrumbs"><a href="../../index.html">Home</a> / Viewer</div>
      <h1>Viewer</h1>
      <div class="toolbar">
        <button data-mode-button="single" type="button">1 Panel</button>
        <button data-mode-button="dual" type="button">2 Panel</button>
        <button data-mode-button="tri" type="button">3 Panel</button>
      </div>
      <div id="viewer-grid" class="layout-grid" data-mode="tri"></div>
    </section>
    <section class="notes-panel">
      <h2>Notes</h2>
      <p class="subtle">Saved locally in browser storage for this baseline. Export wiring comes in the automation block.</p>
      <textarea id="notes-text" placeholder="Capture notes during the interview here."></textarea>
      <div class="button-row">
        <button id="insert-timestamp" type="button">Insert Timestamp</button>
        <button id="copy-notes" type="button">Copy</button>
      </div>
      <p id="save-status" class="subtle">Notes are stored locally in the browser.</p>
    </section>
  </main>
</body>
</html>
